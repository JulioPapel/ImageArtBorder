# Build all platforms and publish a GitHub Release when you push a version tag (v*).
#
# Release a new version:
#   1. Bump version in Cargo.toml + CHANGELOG.md
#   2. git commit && git push origin main
#   3. git tag v1.0.0 && git push origin v1.0.0
#
# workflow_dispatch: builds artifacts only (no GitHub Release).

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

env:
  CARGO_HTTP_CHECK_REVOCATION: 'false'

jobs:
  build:
    name: ${{ matrix.platform }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            platform: windows-x64
            target: x86_64-pc-windows-msvc
            binary: ImageArtBorder.exe
          - os: ubuntu-latest
            platform: linux-x64
            target: x86_64-unknown-linux-gnu
            binary: ImageArtBorder
          - os: macos-14
            platform: macos-arm64
            target: aarch64-apple-darwin
            binary: ImageArtBorder
          - os: macos-13
            platform: macos-x64
            target: x86_64-apple-darwin
            binary: ImageArtBorder

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release --target ${{ matrix.target }}

      - name: Pack Windows
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          $version = (Select-String -Path Cargo.toml -Pattern '^version = "(.+)"').Matches.Groups[1].Value
          $out = "release/dist/ImageArtBorder-$version-${{ matrix.platform }}"
          New-Item -ItemType Directory -Path $out/docs -Force | Out-Null
          Copy-Item "target/${{ matrix.target }}/release/${{ matrix.binary }}" $out/
          Set-Content $out/VERSION $version -NoNewline
          Copy-Item LICENSE, release/README.txt, release/install.ps1, release/uninstall.ps1, release/Add-Border.bat, release/Border-ExportedImages.ps1 $out/
          Copy-Item docs/*.md $out/docs/

      - name: Pack Unix
        if: matrix.os != 'windows-latest'
        run: |
          chmod +x scripts/common-pack.sh release/*.sh
          bash scripts/common-pack.sh "${{ matrix.platform }}" "target/${{ matrix.target }}/release/${{ matrix.binary }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ImageArtBorder-${{ matrix.platform }}
          path: release/dist/ImageArtBorder-*-${{ matrix.platform }}
          retention-days: 5

  publish:
    name: GitHub Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Zip packages
        run: |
          set -euo pipefail
          mkdir -p release-zips
          found=0
          for dir in artifacts/*/ImageArtBorder-*; do
            [ -d "$dir" ] && [ -f "$dir/VERSION" ] || continue
            base="$(basename "$dir")"
            echo "Zipping $dir"
            (cd "$(dirname "$dir")" && zip -r "$GITHUB_WORKSPACE/release-zips/${base}.zip" "$base")
            found=$((found + 1))
          done
          if [ "$found" -lt 1 ]; then
            echo "::error::No release folders found under artifacts/"
            find artifacts | head -80
            exit 1
          fi
          ls -la release-zips/

      - name: Changelog excerpt for release body
        id: changelog
        run: |
          TAG="${{ github.ref_name }}"
          VER="${TAG#v}"
          FILE="${RUNNER_TEMP}/release-notes.md"
          {
            echo "Cross-platform CLI to add solid-color borders to photos (Capture One exports and more). Expands the canvas; preserves metadata where the format allows."
            echo ""
            echo "**Windows** builds are tested in production. **macOS and Linux** packages are included but may not yet be verified on every system—feedback welcome."
            echo ""
            echo "### Downloads"
            echo "| Platform | Zip |"
            echo "|----------|-----|"
            echo "| Windows x64 | \`ImageArtBorder-${VER}-windows-x64.zip\` |"
            echo "| Linux x64 | \`ImageArtBorder-${VER}-linux-x64.zip\` |"
            echo "| macOS Apple Silicon | \`ImageArtBorder-${VER}-macos-arm64.zip\` |"
            echo "| macOS Intel | \`ImageArtBorder-${VER}-macos-x64.zip\` |"
            echo ""
          } > "$FILE"
          if [ -f CHANGELOG.md ]; then
            awk -v ver="$VER" '
              $0 ~ "^## \\[" ver "\\]" { show=1; next }
              show && /^## \[/ { exit }
              show { print }
            ' CHANGELOG.md >> "$FILE" || true
          fi
          echo "path=$FILE" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: ImageArtBorder ${{ github.ref_name }}
          tag_name: ${{ github.ref_name }}
          body_path: ${{ steps.changelog.outputs.path }}
          files: release-zips/*.zip
          fail_on_unmatched_files: true
